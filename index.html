<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>How to Fill Out a 1040 for Beginners | Professor Owl Guide</title>

  <meta name="description" content="Learn how to understand the 1040 tax form in a simple, beginner-friendly way with Professor Owl. Step-by-step guide for beginners." />
  <meta name="keywords" content="1040 guide, how to fill out 1040, beginner taxes, tax form explained, simple tax guide" />

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f9ff;
      color: #222;
    }

    /* HERO */
    .hero {
      text-align: center;
      background: white;
      padding: 30px 20px;
    }

    .owl {
      width: 380px;
      max-width: 90%;
      transition: 0.3s ease;
      cursor: pointer;
    }

    .owl:hover {
      transform: scale(1.05);
    }

    h1 {
      margin: 10px 0;
      font-size: 28px;
    }

    .sub {
      color: #666;
    }

    /* OWL MESSAGE BOX */
    .owl-box {
      background: #fff8dc;
      max-width: 700px;
      margin: 20px auto;
      padding: 18px;
      border-radius: 10px;
      font-size: 18px;
      min-height: 60px;
    }

    /* LESSON CARD */
    .lesson-card {
      max-width: 700px;
      margin: 10px auto;
      background: white;
      padding: 20px;
      border-left: 5px solid #4a90e2;
      border-radius: 10px;
      line-height: 1.5;
    }

    /* BUTTON */
    .btn {
      background: #4a90e2;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      display: block;
      margin: 15px auto;
    }

    .btn:hover {
      background: #357bd8;
    }

    /* CTA */
    .cta-box {
      text-align: center;
      margin: 30px 0;
    }

    .cta {
      display: inline-block;
      background: #28a745;
      color: white;
      padding: 14px 18px;
      border-radius: 8px;
      text-decoration: none;
    }

    .cta:hover {
      background: #218838;
    }

    /* PROGRESS */
    .progress-bar {
      width: 80%;
      margin: 20px auto;
      background: #ddd;
      height: 10px;
      border-radius: 5px;
      overflow: hidden;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: #4a90e2;
      transition: width 0.3s ease;
    }

    /* INTERLINKING */
    .owl-network {
      margin-top: 60px;
      padding: 25px 15px;
      background: #f9fbff;
      text-align: center;
      border-top: 2px solid #e6eefc;
    }

    .link-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      max-width: 900px;
      margin: 20px auto 0;
    }

    .link-card {
      display: block;
      background: white;
      padding: 15px;
      border-radius: 10px;
      text-decoration: none;
      color: #222;
      border-left: 4px solid #4a90e2;
      transition: 0.2s;
    }

    .link-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <div class="hero">

    <a href="YOUR_AFFILIATE_LINK" target="_blank">
      <img src="owl.png" class="owl" id="owlImage" alt="Professor Owl Guide" />
    </a>

    <h1>How to Fill Out a 1040 for Beginners</h1>
    <p class="sub">A simple step-by-step guide with 🦉 Professor Owl</p>

    <a href="YOUR_AFFILIATE_LINK" target="_blank" class="cta">
      👉 Try an easy tax filing tool
    </a>
  </div>

  <!-- OWL SPEECH -->
  <div class="owl-box" id="owlText"></div>

  <!-- LESSON -->
  <div class="lesson-card" id="lessonCard"></div>

  <!-- NEXT -->
  <button class="btn" onclick="nextStep()">Next Step →</button>

  <!-- CTA (mid-page natural placement) -->
  <div class="cta-box">
    <h2>Need help filing your 1040?</h2>
    <a href="YOUR_AFFILIATE_LINK" target="_blank" class="cta">
      👉 Use a simple tax tool
    </a>
  </div>

  <!-- PROGRESS -->
  <div class="progress-bar">
    <div class="progress" id="progress"></div>
  </div>

  <!-- INTERLINKING -->
  <div class="owl-network">
    <h2>🦉 Professor Owl Learning Network</h2>
    <p>More simple tax lessons you might like:</p>
    <div id="owlLinks" class="link-grid"></div>
  </div>

  <script>
    let step = 0;

    const steps = [
      {
        owl: "🦉 Hi! I’m Professor Owl. Let’s learn the 1040 step by step.",
        lesson: "The 1040 form is how people report their yearly income to the government."
      },
      {
        owl: "🦉 Step 1: Write your name.",
        lesson: "Your name goes at the top of the form, just like on a school paper."
      },
      {
        owl: "🦉 Step 2: Add your address.",
        lesson: "This tells the IRS where you live."
      },
      {
        owl: "🦉 Step 3: Report your income.",
        lesson: "Income is the money you earned from work or jobs."
      },
      {
        owl: "🦉 Great job! You understand the basics of the 1040!",
        lesson: "You now know the simple structure of a tax return."
      }
    ];

    function typeText(text) {
      const el = document.getElementById("owlText");
      el.innerHTML = "";
      let i = 0;

      let typing = setInterval(() => {
        el.innerHTML += text.charAt(i);
        i++;
        if (i >= text.length) clearInterval(typing);
      }, 30);
    }

    function nextStep() {
      if (step >= steps.length) step = 0;

      const current = steps[step];

      typeText(current.owl);
      document.getElementById("lessonCard").innerText = current.lesson;

      document.getElementById("progress").style.width =
        ((step + 1) / steps.length) * 100 + "%";

      step++;
    }

    // INTERLINKING SYSTEM
    const sitePages = [
      { title: "What is a W-2?", url: "/w2-guide.html", desc: "Simple W-2 explanation." },
      { title: "Tax Deductions", url: "/deductions.html", desc: "Lower your taxable income." },
      { title: "Tax Refunds", url: "/tax-refund.html", desc: "Why refunds happen." },
      { title: "1040 Checklist", url: "/1040-checklist.html", desc: "Before you file." }
    ];

    function renderLinks() {
      const container = document.getElementById("owlLinks");

      sitePages.forEach(page => {
        const card = document.createElement("a");
        card.href = page.url;
        card.className = "link-card";

        card.innerHTML = `
          <h3>🦉 ${page.title}</h3>
          <p>${page.desc}</p>
        `;

        container.appendChild(card);
      });
    }

    renderLinks();

    // start first lesson
    nextStep();
  </script>

</body>
</html>
