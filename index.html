<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Professor Owl Tax Classroom</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1220;
  color: white;
}

/* ================= HEADER ================= */
.header {
  position: sticky;
  top: 0;
  z-index: 999;
  background: #111827;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 2px solid #22c55e;
}

.header a {
  color: white;
  text-decoration: none;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: bold;
}

.brand img {
  width: 40px;
  height: 40px;
  border-radius: 8px;
}

/* ================= HERO ================= */
.hero {
  text-align: center;
  padding: 30px 15px;
}

.owl {
  width: 120px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* ================= BOARD ================= */
.board {
  max-width: 900px;
  margin: 20px auto;
  background: #14532d;
  border-radius: 10px;
  padding: 20px;
  border: 3px solid #22c55e;
  min-height: 120px;
  transition: 0.3s ease;
}

.title {
  font-size: 18px;
  font-weight: bold;
}

.text {
  margin-top: 10px;
  color: #d1fae5;
}

/* ================= CONTROLS ================= */
.controls {
  text-align: center;
  margin: 15px;
}

button {
  background: #22c55e;
  border: none;
  padding: 10px 14px;
  margin: 5px;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

/* ================= SCHEDULE ================= */
.schedule {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 10px;
  padding: 20px;
  max-width: 1000px;
  margin: auto;
}

.card {
  background: #1f2937;
  padding: 15px;
  border-radius: 10px;
  border-left: 4px solid #22c55e;
  opacity: 0.7;
}

/* ================= CTA ================= */
.cta {
  text-align: center;
  margin: 30px;
}

.cta a {
  background: #22c55e;
  padding: 12px 18px;
  border-radius: 8px;
  color: black;
  text-decoration: none;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- ================= HEADER ================= -->
<div class="header">
  <a class="brand" href="https://www.linkconnector.com/ta.php?lc=007949054186005142&atid=ProfessorOwlTaxGuide">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Cute_Barn_Owl.jpg" alt="Owl">
    Professor Owl Tax Classroom
  </a>
</div>

<!-- ================= HERO ================= -->
<div class="hero">
  <img class="owl" src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Cute_Barn_Owl.jpg" alt="Professor Owl">
  <h1>Interactive Learning Classroom</h1>
  <p>Step-by-step guided learning experience</p>
</div>

<!-- ================= BOARD ================= -->
<div class="board">
  <div class="title" id="title">Welcome to Class 🦉</div>
  <div class="text" id="text">Click Next to begin your lesson journey.</div>
</div>

<!-- ================= CONTROLS ================= -->
<div class="controls">
  <button onclick="prevLesson()">⬅ Back</button>
  <button onclick="nextLesson()">Next ➡</button>
</div>

<!-- ================= SCHEDULE PREVIEW ================= -->
<div class="schedule">
  <div class="card">📘 Schedule 1<br>Extra Income Concepts</div>
  <div class="card">📗 Schedule 2<br>Tax Adjustments Concepts</div>
  <div class="card">📙 Schedule 3<br>Credits & Payments Concepts</div>
</div>

<!-- ================= CTA ================= -->
<div class="cta">
  <a href="https://www.linkconnector.com/ta.php?lc=007949054186005142&atid=ProfessorOwlTaxGuide">
    Visit Official Resource
  </a>
</div>

<script>
const lessons = [
  ["Identity Basics", "Understanding who the system applies to."],
  ["Filing Overview", "Why annual reporting exists."],
  ["Income Concept", "Money earned from work or other sources."],
  ["Multiple Income Sources", "Different ways income can appear."],
  ["Income Summary", "Combining all income into one picture."],
  ["Adjustment Idea", "Why income may be adjusted."],
  ["Fairness Principle", "Why tax systems aim for balance."],
  ["Deduction Concept", "Ways income may be reduced."],
  ["Standard vs Options", "Different deduction approaches."],
  ["Taxable Income", "Income used for calculation."],
  ["System Activation", "Where tax rules begin applying."],
  ["Progressive Structure", "Higher income treated differently."],
  ["Calculation Flow", "How tax math is structured."],
  ["Preliminary Result", "First estimated outcome."],
  ["Adjustment Layer", "Refinements to calculations."],
  ["Credit Concept", "Direct reductions to tax owed."],
  ["Refund Idea", "When payments exceed obligations."],
  ["Payment System", "Money paid throughout the year."],
  ["Withholding Concept", "Automatic payments from income."],
  ["Tracking System", "Recording all payments."],
  ["Comparison Stage", "Matching owed vs paid."],
  ["Refund Outcome", "Money returned if overpaid."],
  ["Balance Due", "Money still owed."],
  ["Accuracy Importance", "Why correct data matters."],
  ["Verification System", "Cross-checking information."],
  ["Correction Stage", "Fixing errors if found."],
  ["Validation Step", "Final confirmation."],
  ["Submission", "Sending data for processing."],
  ["Processing", "System review phase."],
  ["Review Stage", "Checking details."],
  ["Error Detection", "Finding inconsistencies."],
  ["Correction Review", "Fixing flagged issues."],
  ["Approval Stage", "Accepting valid data."],
  ["Final Result", "Outcome of system process."],
  ["Record Storage", "Saving history."],
  ["Audit Concept", "Possible future review."],
  ["Completion", "Process finished."],
  ["Big Picture", "How the system works overall."]
];

let i = 0;

function render() {
  document.getElementById("title").innerText = lessons[i][0];
  document.getElementById("text").innerText = lessons[i][1];
}

function nextLesson() {
  if (i < lessons.length - 1) i++;
  render();
}

function prevLesson() {
  if (i > 0) i--;
  render();
}

render();
</script>

</body>
</html>
