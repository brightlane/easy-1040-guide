<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Professor Owl Tax Wizard</title>

<style>
body{
  font-family: Arial;
  background:#07162f;
  color:white;
  padding:20px;
  font-size:20px;
  line-height:1.6;
}

h1{font-size:36px;}

.card{
  background:#102a52;
  padding:25px;
  border-radius:14px;
  margin-top:20px;
  min-height:260px;
}

.tip{
  background:#081a33;
  border-left:6px solid #9fc3ff;
  padding:12px;
  margin-top:12px;
}

.warning{
  background:#2a1a1a;
  border-left:6px solid #ffcc66;
  padding:12px;
  margin-top:12px;
}

.buttons{
  margin-top:20px;
  display:flex;
  gap:10px;
}

button{
  background:#9fc3ff;
  border:none;
  padding:12px 18px;
  font-weight:bold;
  cursor:pointer;
  border-radius:8px;
  color:#07162f;
}

button:disabled{
  opacity:0.4;
  cursor:not-allowed;
}

a.button{
  background:#9fc3ff;
  color:#07162f;
  padding:14px 18px;
  text-decoration:none;
  font-weight:bold;
  border-radius:8px;
  display:inline-block;
}
</style>
</head>

<body>

<h1>🦉 Professor Owl Tax Wizard</h1>

<div class="card" id="stepBox"></div>

<div class="buttons">
  <button onclick="backStep()">⬅ Back</button>
  <button onclick="nextStep()">Next ➡</button>
</div>

<div id="finalCTA" style="display:none; margin-top:25px; text-align:center;">
  <h2>🎉 You’re Ready!</h2>
  <p>You now understand the full tax process step-by-step.</p>
  <a class="button" href="https://is.gd/SRCKpA">🦉 Start Guided Filing</a>
</div>

<script>
const steps = [

{
title:"Welcome",
text:`Hello! I’m Professor Owl 🦉. I will teach you taxes step-by-step.
Most people think taxes are hard — they are NOT.
They are just simple steps you follow one at a time.`,
tip:"Think of this like following a recipe.",
warning:"Do NOT try to understand everything at once."
},

{
title:"Step 1 — Income (Big Picture)",
text:`First we collect ALL your money.
This includes your job, side jobs, and small earnings.`,
tip:"Everything starts with income.",
warning:"Most beginners forget side income."
},

{
title:"W-2 Job Income",
text:`Your main job gives you a W-2 form.
This shows how much you earned for the year.`,
tip:"This is usually your biggest number.",
warning:"Copy it exactly — no guessing."
},

{
title:"1099 Side Income",
text:`If you worked apps, freelanced, or got paid cash,
you must include it here.`,
tip:"Side jobs still count.",
warning:"This is the most commonly missed step."
},

{
title:"Interest & Small Money",
text:`Banks may pay you interest on savings.
Even small amounts must be included.`,
tip:"Every dollar counts.",
warning:"Even $1 must be reported."
},

{
title:"Total Income",
text:`Now we add everything together.
This becomes your total income for the year.`,
tip:"This is your starting point for taxes.",
warning:"Double-check math carefully."
},

{
title:"Adjustments",
text:`Now we subtract allowed expenses.
This includes student loan interest or retirement savings.`,
tip:"This lowers your taxes.",
warning:"Only approved items can be used."
},

{
title:"BIG CONFUSION ZONE ⚠️",
text:`This is where most people get lost.
They think they can subtract anything — but you cannot.`,
tip:"Only IRS-approved deductions count.",
warning:"Wrong deductions can cause issues."
},

{
title:"Standard Deduction",
text:`Most people use the standard deduction.
It is a fixed amount that reduces taxable income.`,
tip:"This is the easiest option.",
warning:"Do NOT overthink this step."
},

{
title:"Taxable Income",
text:`Now we calculate what is left after deductions.
This is the money that gets taxed.`,
tip:"Less taxable income = less tax.",
warning:"This number decides everything."
},

{
title:"Tax Calculation",
text:`The IRS applies tax rates to your income.
Higher income = higher tax brackets.`,
tip:"You usually don’t calculate this manually.",
warning:"Software handles this for most people."
},

{
title:"Tax Credits",
text:`Credits reduce your tax directly.
Examples: child credit, education credit.`,
tip:"Credits are powerful savings.",
warning:"Don’t confuse credits with deductions."
},

{
title:"Payments Already Made",
text:`Your employer already paid some taxes for you.
This is taken from your paycheck.`,
tip:"You may already have paid most tax.",
warning:"Always check your W-2."
},

{
title:"Final Calculation",
text:`Now we compare:
what you owe vs what you already paid.`,
tip:"This decides refund or balance due.",
warning:"This is the final step before result."
},

{
title:"Refund or Owe",
text:`If you paid too much → refund.
If you paid too little → you owe money.`,
tip:"Simple balance check.",
warning:"No tricks here — just math."
}

];

let index = 0;

function render(){
  const s = steps[index];
  document.getElementById("stepBox").innerHTML = `
    <h2>${s.title}</h2>
    <p>${s.text}</p>
    <div class="tip">🦉 Tip: ${s.tip}</div>
    <div class="warning">⚠️ ${s.warning}</div>
    <p>Step ${index+1} of ${steps.length}</p>
  `;

  document.getElementById("finalCTA").style.display =
    (index === steps.length-1) ? "block" : "none";
}

function nextStep(){
  if(index < steps.length-1) index++;
  render();
}

function backStep(){
  if(index > 0) index--;
  render();
}

render();
</script>

</body>
</html>
